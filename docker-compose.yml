version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    environment:
      - PORT=8080
      - OUTPUT_DIR=/app/output
    networks:
      - harvest-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - harvest-net

networks:
  harvest-net:
    driver: bridge
